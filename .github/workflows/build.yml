name: Build iOS IPA
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Generate pbxproj
        run: python3 gen_pbxproj.py
      - name: Archive (unsigned)
        run: |
          xcodebuild archive \
            -project BiliLite.xcodeproj \
            -scheme BiliLite \
            -archivePath BiliLite.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.bililite.app
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R BiliLite.xcarchive/Products/Applications/BiliLite.app Payload/
          zip -r -y BiliLite-unsigned.ipa Payload
          rm -rf Payload
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BiliLite-unsigned
          path: BiliLite-unsigned.ipa
          retention-days: 7
