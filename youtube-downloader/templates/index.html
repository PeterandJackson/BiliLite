<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 视频下载器</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- 背景装饰 -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <!-- 主容器 -->
    <div class="container">

        <!-- 标题 -->
        <div class="header">
            <h1>🎬 YouTube 视频下载器</h1>
            <p>粘贴链接，选择画质，一键下载</p>
        </div>

        <!-- URL 输入卡片 -->
        <div class="card">
            <div class="card-title">🔗 视频 URL</div>
            <div class="input-row">
                <input
                    type="text"
                    id="urlInput"
                    placeholder="在此粘贴 YouTube 视频链接..."
                    autocomplete="off"
                />
                <button class="btn btn-ghost" id="btnPaste">📋 粘贴</button>
                <button class="btn btn-primary" id="btnFetch">🔍 获取信息</button>
            </div>
        </div>

        <!-- 视频信息卡片 -->
        <div class="card" id="infoCard" style="display:none;">
            <div class="card-title">📹 视频信息</div>
            <div class="info-content">
                <div class="info-thumb" id="infoThumb">
                    <img id="thumbImg" src="" alt="" />
                </div>
                <div class="info-text">
                    <div class="info-title" id="infoTitle">—</div>
                    <div class="info-meta">
                        <span id="infoDuration">⏱ —</span>
                        <span id="infoUploader">👤 —</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 下载设置卡片 -->
        <div class="card">
            <div class="card-title">⚙️ 下载设置</div>
            <div class="settings-grid">
                <div class="setting-item">
                    <label>画质</label>
                    <select id="qualitySelect">
                        {% for q in qualities %}
                        <option value="{{ q }}" {% if q == '1080p' %}selected{% endif %}>{{ q }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="setting-item">
                    <label>保存位置</label>
                    <div class="dir-row">
                        <input type="text" id="dirInput" readonly />
                        <button class="btn btn-ghost" id="btnBrowse">📁 浏览</button>
                    </div>
                </div>
            </div>
            <div class="settings-grid" style="margin-top:10px;">
                <div class="setting-item" style="flex:1;">
                    <label>🔑 代理设置（国内访问需要）</label>
                    <input type="text" id="proxyInput" placeholder="例: http://127.0.0.1:7890 或 socks5://127.0.0.1:1080" />
                </div>
            </div>
        </div>

        <!-- 进度卡片 -->
        <div class="card" id="progressCard" style="display:none;">
            <div class="card-title">📥 下载进度</div>
            <div class="progress-wrap">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-stats">
                    <span class="progress-percent" id="percentText">0%</span>
                    <span class="progress-speed" id="speedText"></span>
                    <span class="progress-eta" id="etaText"></span>
                </div>
            </div>
        </div>

        <!-- 操作区 -->
        <div class="action-bar">
            <button class="btn btn-download" id="btnDownload">
                <span class="btn-icon">⬇</span>
                <span id="btnDownloadText">开始下载</span>
            </button>
            <span class="status" id="statusText">✅ 就绪</span>
        </div>

    </div>

    <!-- 代理未开启弹窗 -->
    <div class="modal-overlay" id="proxyModal" style="display:none;">
        <div class="modal-box">
            <div class="modal-icon">⚠️</div>
            <div class="modal-title">代理未开启</div>
            <div class="modal-body" id="proxyModalBody">
                检测不到代理连接，请先开启代理软件（如 Clash Verge、V2RayN 等），<br>
                然后在下方填入代理地址后重试。
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" id="btnModalClose">我知道了</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
